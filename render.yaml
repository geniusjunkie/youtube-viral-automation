services:
  # Backend API Service
  - type: web
    name: viroscope-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: YOUTUBE_API_KEY
        sync: false  # You'll set this in Render dashboard
      - key: FLASK_ENV
        value: production
    rootDir: backend

  # Static Frontend (Optional - can also use Render Static Sites)
  - type: static
    name: viroscope-frontend
    buildCommand: ""  # No build needed for static HTML
    staticPublishPath: .
    rootDir: .
    routes:
      - type: rewrite
        source: /api/*
        destination: https://viroscope-api.onrender.com/api/*
